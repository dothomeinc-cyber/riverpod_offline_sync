name: riverpod_offline_sync
description: Production-ready offline-first sync engine for Flutter super apps with Riverpod integration
version: 1.0.2

homepage: https://github.com/yourusername/riverpod_offline_sync
repository: https://github.com/yourusername/riverpod_offline_sync
issue_tracker: https://github.com/yourusername/riverpod_offline_sync/issues

environment:
  sdk: ">=3.5.0 <4.0.0"
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^3.0.0

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Connectivity
  connectivity_plus: ^7.0.0

  # Networking
  http: ^1.3.0

  # Utilities
  uuid: ^4.5.1
  equatable: ^2.0.7
  clock: ^1.1.2
  synchronized: ^3.4.0

  # UI & Responsive
  flutter_screenutil: ^5.9.3
  google_fonts: ^8.1.0

  # Firebase
  firebase_core: ^4.0.0
  cloud_firestore: ^6.0.0
  firebase_storage: ^13.0.0
  firebase_auth: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # Testing
  mocktail: ^1.0.4
  network_image_mock: ^2.1.1

  # Hive code generation
  hive_generator: ^2.0.1
  build_runner: ^2.4.13

dependency_overrides:
  analyzer: ^6.4.1

flutter:
  uses-material-design: true

  # assets:
  #   - assets/icons/
  #   - assets/images/

platforms:
  android:
  ios:
  web:
  macos:
  windows:
  linux:

topics:
  - offline
  - sync
  - riverpod
  - queue
  - firebase